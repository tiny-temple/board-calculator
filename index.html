function updateRejectButtonBadges(){document.querySelectorAll("#rejectButtonGrid button").forEach(btn=>{const defectType=btn.dataset.defectType,count=rejectBasket[defectType]||0,isNoRejectsSelected=defectType==="No Rejects"&&rejectBasket["No Rejects"]!==undefined;btn.innerHTML="";const label=document.createElement("span");label.textContent=defectType;btn.appendChild(label);if(count>0||isNoRejectsSelected){const badge=document.createElement("span");badge.className="rejectCountBadge";badge.textContent=isNoRejectsSelected?"✓":count;btn.appendChild(badge)}})}
function addRejectToBasket(defectType){if(defectType==="No Rejects"){rejectBasket={"No Rejects":0};rejectHistory=[{defectType:"No Rejects",qty:0}];renderRejectBasket();saveRejectDraft();return}if(rejectBasket["No Rejects"]!==undefined){rejectBasket={};rejectHistory=[]}if(!rejectBasket[defectType])rejectBasket[defectType]=0;rejectBasket[defectType]+=1;rejectHistory.push({defectType,qty:1});renderRejectBasket();saveRejectDraft()}
function decrementReject(defectType){if(rejectBasket[defectType]===undefined)return;if(defectType==="No Rejects"){delete rejectBasket[defectType];rejectHistory=[];renderRejectBasket();saveRejectDraft();return}rejectBasket[defectType]-=1;if(rejectBasket[defectType]<=0)delete rejectBasket[defectType];for(let i=rejectHistory.length-1;i>=0;i--){if(rejectHistory[i].defectType===defectType){rejectHistory.splice(i,1);break}}renderRejectBasket();saveRejectDraft()}
function undoLastReject(){if(!rejectHistory.length){renderRejectBasket();return}const last=rejectHistory.pop();if(last.defectType==="No Rejects"){delete rejectBasket["No Rejects"];renderRejectBasket();saveRejectDraft();return}if(rejectBasket[last.defectType]!==undefined){rejectBasket[last.defectType]-=1;if(rejectBasket[last.defectType]<=0)delete rejectBasket[last.defectType]}renderRejectBasket();saveRejectDraft()}
function clearRejectBasket(){rejectBasket={};rejectHistory=[];renderRejectBasket();saveRejectDraft()}
function renderRejectBasket(){const box=document.getElementById("rejectBasketTotals");if(!box)return;const lines=getBasketRejectLines();if(!lines.length){box.innerHTML="No rejects logged yet.";updateRejectButtonBadges();return}let total=0;box.innerHTML="";lines.forEach(line=>{total+=Number(line.rejectQty||0);const row=document.createElement("div");row.className="rejectBasketLine";const label=document.createElement("div");label.textContent=line.defectType+": "+line.rejectQty;const minus=document.createElement("button");minus.type="button";minus.textContent="-";minus.onclick=()=>decrementReject(line.defectType);row.appendChild(label);row.appendChild(minus);box.appendChild(row)});const totalRow=document.createElement("div");totalRow.style.marginTop="8px";totalRow.style.fontWeight="600";totalRow.textContent="Total rejects: "+total;box.appendChild(totalRow);updateRejectButtonBadges()}
function getBasketRejectLines(){return Object.keys(rejectBasket).map(defectType=>({defectType,rejectQty:Number(rejectBasket[defectType]||0)}))}
function getRejectDetails(){if(!currentEntryMode)return null;const config=ENTRY_MODES[currentEntryMode];if(currentEntryMode==="pack_visualiser"){const result=calculationResult(),defectType=defectTypeSel.value,packId=document.getElementById("packId").value.trim(),rejectQty=defectType==="No Rejects"?0:result.rejects;return{config,defectType,packId,rejectQty,result}}return null}
function getRejectDeviceId(){let deviceId=localStorage.getItem(REJECT_DEVICE_ID_KEY);if(!deviceId){deviceId="device_"+Date.now()+"_"+Math.random().toString(36).slice(2,10);localStorage.setItem(REJECT_DEVICE_ID_KEY,deviceId)}return deviceId}
function createRejectSubmissionId(){return["sub",getRejectDeviceId(),Date.now(),Math.random().toString(36).slice(2,10)].join("_")}function getRejectOutboxKey(submissionId){return REJECT_OUTBOX_PREFIX+submissionId}
function savePayloadToOutbox(payload){if(!payload.submissionId)payload.submissionId=createRejectSubmissionId();const key=getRejectOutboxKey(payload.submissionId);const record={savedAt:new Date().toISOString(),lastAttemptAt:"",attempts:0,payload};localStorage.setItem(key,JSON.stringify(record));updateLocalOutboxStatus()}
function markOutboxAttempt(submissionId){if(!submissionId)return;const key=getRejectOutboxKey(submissionId),raw=localStorage.getItem(key);if(!raw)return;try{const record=JSON.parse(raw);record.attempts=Number(record.attempts||0)+1;record.lastAttemptAt=new Date().toISOString();localStorage.setItem(key,JSON.stringify(record))}catch(err){}}
function getLocalOutboxItems(){const items=[];for(let i=0;i<localStorage.length;i++){const key=localStorage.key(i);if(key&&key.indexOf(REJECT_OUTBOX_PREFIX)===0){try{const record=JSON.parse(localStorage.getItem(key));if(record&&record.payload)items.push({key,record})}catch(err){}}}return items}
function updateLocalOutboxStatus(){const el=document.getElementById("localOutboxStatus");if(!el)return;const count=getLocalOutboxItems().length;if(count)el.innerText="Local backup submissions on this iPad: "+count+". These are retained as a safety backup and may already be logged.";else el.innerText="No local backup submissions stored on this iPad."}
function resendLocalOutbox(){const status=document.getElementById("saveStatus"),items=getLocalOutboxItems();if(!items.length){status.innerText="No local backup submissions to resend.";updateLocalOutboxStatus();return}const ok=window.confirm("This will resend "+items.length+" local backup submission(s).\n\nOnly do this if the entries are missing from the Reject Log, otherwise duplicates may be created.");if(!ok){status.innerText="Resend cancelled.";return}items.forEach(item=>sendRejectPayloadInBackground(item.record.payload));status.innerText="Resent "+items.length+" local backup submission(s).";updateLocalOutboxStatus()}
function clearLocalOutboxBackups(){const status=document.getElementById("saveStatus"),items=getLocalOutboxItems();if(!items.length){status.innerText="No local backup submissions to clear.";updateLocalOutboxStatus();return}const ok=window.confirm("Clear "+items.length+" local backup submission(s) from this iPad?\n\nOnly clear them after checking the Reject Log has the saved entries.");if(!ok){status.innerText="Clear cancelled.";return}items.forEach(item=>localStorage.removeItem(item.key));status.innerText="Local backup submissions cleared from this iPad.";updateLocalOutboxStatus()}
function sendRejectPayloadInBackground(payload){if(!payload.submissionId)payload.submissionId=createRejectSubmissionId();payload.deviceId=getRejectDeviceId();savePayloadToOutbox(payload);markOutboxAttempt(payload.submissionId);const body=JSON.stringify(payload);try{if(navigator.sendBeacon){const blob=new Blob([body],{type:"text/plain;charset=utf-8"}),queued=navigator.sendBeacon(REJECT_LOG_WEB_APP_URL,blob);if(queued){updateLocalOutboxStatus();return}}fetch(REJECT_LOG_WEB_APP_URL,{method:"POST",mode:"no-cors",headers:{"Content-Type":"text/plain;charset=utf-8"},body,keepalive:true}).catch(err=>localStorage.setItem(["ttRejectSendError",payload.team||"",payload.productionRow||"",payload.entryMode||"",payload.packId||"",Date.now()].join("|"),JSON.stringify({error:err.message,payload})))}catch(err){localStorage.setItem(["ttRejectSendError",payload.team||"",payload.productionRow||"",payload.entryMode||"",payload.packId||"",Date.now()].join("|"),JSON.stringify({error:err.message,payload}))}updateLocalOutboxStatus()}
async function reviewAndSaveBasket(){const status=document.getElementById("saveStatus"),saveBtn=document.getElementById("simpleSaveBtn");if(!currentEntryMode||currentEntryMode==="pack_visualiser"){status.innerText="Choose a process first.";return}if(!jobContext.productionRow){status.innerText="No Production row found. Select a scheduled job first.";return}const config=ENTRY_MODES[currentEntryMode],packId=document.getElementById("simplePackId").value.trim(),rejectLines=getBasketRejectLines();if(!packId){status.innerText="Select the Pack ID before reviewing.";return}if(!rejectLines.length){status.innerText="Tap at least one reject type, or select No Rejects.";return}const totalRejects=rejectLines.reduce((sum,line)=>sum+Number(line.rejectQty||0),0);const recapLines=["Review pack reject log","","Team: "+(currentTeam||""),"Job: "+(jobContext.sheetJob||""),"Production Row: "+(jobContext.productionRow||"")];if(currentJob)recapLines.push("Client: "+(currentJob.client||""),"Spec: "+(currentJob.quantity||"")+" | "+(currentJob.length||"")+"m | "+(currentJob.species||"")+" | "+(currentJob.finishedSize||"")+" | "+(currentJob.profile||""));recapLines.push("Process: "+(config.processStage||""),"Pack ID: "+packId,"","Rejects:");rejectLines.forEach(line=>recapLines.push("- "+line.defectType+": "+line.rejectQty));recapLines.push("","Total rejects: "+totalRejects,"Logged As: "+(config.rejectColumn==="machine"?"Machine Defect":"Pre Process Reject"));if(!window.confirm(recapLines.join("\n"))){status.innerText="Save cancelled. Continue logging or edit the basket.";return}const payload={source:"TT Process Logger",team:currentTeam,timestamp:new Date().toISOString(),productionRow:jobContext.productionRow,jobNo:jobContext.jobNo,sheetJob:jobContext.sheetJob,packId,entryMode:currentEntryMode,entryModeLabel:config.label,processStage:config.processStage,rejectColumn:config.rejectColumn,processSetup:currentProcessSetup,rejects:rejectLines};saveBtn.disabled=true;status.innerText="Submitting...";archiveSubmittedDraft(payload);clearRejectDraft();rejectBasket={};rejectHistory=[];renderRejectBasket();sendRejectPayloadInBackground(payload);status.innerText="";saveBtn.disabled=false;showPostSaveScreen(payload,totalRejects)}
async function saveToRejectLog(){const status=document.getElementById("saveStatus"),saveBtn=document.getElementById("saveBtn"),details=getRejectDetails();if(!details){status.innerText="Choose an entry type first.";return}if(!jobContext.productionRow){status.innerText="No Production row found. Select a scheduled job first.";return}if(!details.defectType){status.innerText="Select a reject type before saving.";return}if(details.defectType!=="No Rejects"&&details.rejectQty<=0){status.innerText="Enter a reject quantity greater than zero, or select No Rejects.";return}if(currentEntryMode==="pack_visualiser"){const result=details.result;if(!result.baseBoards||!result.perRow||result.topLoose===null){status.innerText="Complete the visualiser before saving.";return}}if(!details.packId){status.innerText="Confirm the Pack ID before saving.";return}const payload={source:"TT Process Logger",team:currentTeam,timestamp:new Date().toISOString(),productionRow:jobContext.productionRow,jobNo:jobContext.jobNo,sheetJob:jobContext.sheetJob,packId:details.packId,entryMode:currentEntryMode,entryModeLabel:details.config.label,processStage:details.config.processStage,rejectColumn:details.config.rejectColumn,defectType:details.defectType,rejectQty:details.rejectQty,mode:details.result.mode,inputBoards:details.result.inputBoards,inputMetres:details.result.inputMetres,boardLength:details.result.boardLength,yield:details.result.yield,topLoose:details.result.topLoose,rows:details.result.rows,baseBoards:details.result.baseBoards,basePhysicalBoards:details.result.basePhysicalBoards,perRow:details.result.perRow,rejects:details.rejectQty,total:details.result.total,physicalBoards:details.result.physicalBoards};const recapLines=["Confirm reject log entry","","Team: "+(currentTeam||""),"Job: "+(jobContext.sheetJob||""),"Production Row: "+(jobContext.productionRow||""),"Process: "+(details.config.processStage||""),"Pack ID: "+(details.packId||""),"Reject Type: "+(details.defectType||""),"Quantity: "+details.rejectQty,"Logged As: "+(details.config.rejectColumn==="machine"?"Machine Defect":"Pre Process Reject")];if(currentJob)recapLines.splice(4,0,"Client: "+(currentJob.client||""),"Spec: "+(currentJob.quantity||"")+" | "+(currentJob.length||"")+"m | "+(currentJob.species||"")+" | "+(currentJob.finishedSize||"")+" | "+(currentJob.profile||""));if(!window.confirm(recapLines.join("\n"))){status.innerText="Save cancelled. Edit the entry and save again.";return}saveBtn.disabled=true;status.innerText="Submitting...";archiveSubmittedDraft(payload);sendRejectPayloadInBackground(payload);status.innerText="Saved.";saveBtn.disabled=false}
document.getElementById("operatorId").addEventListener("change",()=>updateOperatorGuestVisibility());document.getElementById("simplePackId").addEventListener("change",function(){if(currentEntryMode&&currentEntryMode!=="pack_visualiser"){document.getElementById("saveStatus").innerText="";jobContext.packId=this.value;updateJobContextBar();restoreRejectDraft()}});buildProcessMenu();updateLocalOutboxStatus();updateJobContextBar();fillPackIdFields();updateUI();render();
</script>

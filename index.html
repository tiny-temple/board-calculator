<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Board Calculator</title>

<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#4caf50">

<style>
body {
  font-family: Avenir, "Avenir Next", "Segoe UI", Helvetica, Arial, sans-serif;
  margin: 12px;
  background:#fff;
  overflow-x:hidden;
  padding-bottom: 130px;
}

.panel {
  display:grid;
  grid-template-columns:1fr;
  gap:8px;
  margin-bottom:10px;
}

select {
  appearance: none;
  -webkit-appearance: none;
  color: #000;
  background-color: #fff;
  border: 1px solid rgba(0,0,0,0.15);
  border-radius: 6px;
}

input, select {
  width:100%;
  max-width:360px;
  padding:10px;
  font-size:16px;
  box-sizing:border-box;
}

label {
  font-size:13px;
  color:#333;
  margin-bottom:2px;
}

#linearWrap {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.hidden { display:none !important; }

button {
  appearance: none;
  -webkit-appearance: none;
  width:100%;
  max-width:360px;
  padding:12px 14px;
  font-size:16px;
  font-weight:500;
  border-radius:10px;
  border:1px solid rgba(0,0,0,0.15);
  background:#f5f5f5;
  color:#333;
  margin-top:6px;
  cursor:pointer;
  transition: background 0.15s ease, transform 0.05s ease;
  -webkit-tap-highlight-color: transparent;
}

button:disabled {
  opacity:0.45;
  cursor:not-allowed;
}

.primaryBtn {
  background:#333;
  color:#fff;
}

.btnRow {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:6px;
}

.modeButtons {
  display:flex;
  flex-direction:column;
  gap:8px;
}

.fieldBlock {
  display:flex;
  flex-direction:column;
  gap:5px;
  margin-bottom:8px;
}

.grid {
  display:flex;
  flex-direction:column;
  gap:6px;
  margin-top:12px;
  width:100%;
  max-width:100vw;
}

.row {
  display:flex;
  gap:4px;
  align-items:stretch;
  width:100%;
}

.row.loose {
  margin-bottom:12px;
}

.cell, .empty {
  flex:1 1 0;
  min-width:0;
  aspect-ratio:3/1;
  box-sizing:border-box;
}

.cell {
  border:1px solid rgba(0,0,0,0.15);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:11px;
  border-radius:3px;
  background:#8b5a2b;
  color:#fff;
}

.empty {
  border:1px dashed rgba(0,0,0,0.1);
}

.reject { background:#f4a300 !important; }
.loose .cell { background:#a06a3a; }

.ghost .cell {
  opacity:0.12;
  background:rgba(139,90,43,0.15);
}

.rowNum {
  font-size:11px;
  color:#666;
  padding-left:8px;
  min-width:20px;
  flex:0 0 auto;
}

#jobContextBar {
  font-size:13px;
  line-height:1.35;
  background:#f6f6f6;
  border:1px solid rgba(0,0,0,0.12);
  border-radius:8px;
  padding:8px 10px;
  margin-bottom:10px;
  color:#333;
}

#saveStatus {
  font-size:13px;
  margin-top:8px;
  color:#333;
}

.simpleBox {
  border:1px solid rgba(0,0,0,0.12);
  border-radius:10px;
  padding:10px;
  background:#fafafa;
}

#step5_rejects {
  position: fixed;
  left: 0;
  right: 0;
  bottom: 0;
  background: #fff;
  border-top: 1px solid rgba(0,0,0,0.12);
  padding: 10px 12px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}

.step5Buttons {
  display: flex;
  flex-direction: row;
  gap: 8px;
  width: 100%;
}

.step5Buttons button {
  flex: 1 1 0;
  width: auto !important;
  margin-top: 0 !important;
}

  .rejectButtonGrid {
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:8px;
}

.rejectButtonGrid button {
  max-width:none;
  min-height:54px;
  margin-top:0;
  text-align:center;
}

.rejectBasketTotals {
  border:1px solid rgba(0,0,0,0.12);
  border-radius:10px;
  background:#fff;
  padding:10px;
  margin-top:10px;
  font-size:14px;
}

.rejectBasketLine {
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:8px;
  padding:6px 0;
  border-bottom:1px solid rgba(0,0,0,0.08);
}

.rejectBasketLine:last-child {
  border-bottom:none;
}

.rejectBasketLine button {
  width:auto;
  min-width:44px;
  padding:6px 10px;
  margin-top:0;
}

.basketActions {
  display:flex;
  flex-direction:column;
  gap:8px;
  margin-top:10px;
}


</style>
</head>

<body>

<div id="headerBar" style="display:flex; justify-content:space-between; align-items:flex-start; gap:12px; margin-bottom:12px;">
  <div style="display:flex; flex-direction:column; gap:6px;">
    <h3 style="margin:0; line-height:1.2;">
      Pack Visualiser (v6.4)
    </h3>
  </div>

  <img src="https://static1.squarespace.com/static/5edd6c658f45a62c80cc5bee/t/648b901ba727837ab5445bef/1776199641436/"
       alt="Logo"
       style="height:40px; width:auto; object-fit:contain;" />
</div>

<div id="jobContextBar" class="hidden"></div>

<div class="panel">

  <div id="teamQueueBlock">
    <div class="fieldBlock">
      <label>Select team</label>
      <div class="modeButtons">
        <button class="primaryBtn" onclick="loadTeamQueue('A')">Team A</button>
        <button onclick="loadTeamQueue('B')">Team B</button>
      </div>
    </div>

    <div id="queueStatus" style="font-size:13px;color:#333;margin-bottom:8px;"></div>
    <div id="jobQueue"></div>
  </div>

  <div id="step0_entry" class="hidden">
    <div class="fieldBlock">
      <label>What do you want to do?</label>
      <div class="modeButtons">
        <button class="primaryBtn" onclick="setEntryMode('pack_visualiser')">Pack Visualiser</button>
        <button onclick="setEntryMode('moulder_rejects')">Log Moulder Rejects</button>
        <button onclick="setEntryMode('paint_room_rejects')">Log Paint Room Rejects</button>
      </div>
    </div>
  </div>

  <div id="modeBlock" class="hidden">
    <label>Target Total is measured in:</label>
    <select id="mode"></select>
  </div>

  <div id="step1_boards" class="step hidden">

    <div id="boardsWrap">
      <input id="boards" type="number" placeholder="Quantity of Boards Required" />
    </div>

    <div id="linearWrap">
      <input id="metres" type="number" placeholder="Number of Linear Metres Required" />
      <select id="boardLength"></select>
    </div>

  </div>

  <div id="step2_perRow" class="step hidden">
    <select id="perRow"></select>
  </div>

  <div id="step3_yield" class="step hidden">
    <label>Yield when bandsawing</label>
    <select id="yield"></select>
  </div>

  <div id="step4_loose" class="step hidden">
    <select id="topLoose"></select>
  </div>

  <div id="step5_rejects" class="step hidden step5Bar">
    <select id="rejects"></select>
    <select id="defectType"></select>
    <select id="packId"></select>

    <div class="step5Buttons">
      <button onclick="prevStep()">Back</button>
      <button onclick="resetAll()">Reset</button>
      <button id="saveBtn" onclick="saveToRejectLog()">Review & Save</button>
    </div>
  </div>

  <div id="simpleLogger" class="hidden simpleBox">
  <div class="fieldBlock">
    <label id="simpleLoggerTitle">Log Rejects</label>
  </div>

  <div class="fieldBlock">
    <label>Pack ID used</label>
    <select id="simplePackId"></select>
  </div>

  <div class="fieldBlock">
    <label>Tap defects as they happen</label>
    <div id="rejectButtonGrid" class="rejectButtonGrid"></div>
  </div>

  <div id="rejectBasketTotals" class="rejectBasketTotals">
    No rejects logged yet.
  </div>

  <div class="basketActions">
    <button onclick="undoLastReject()">Undo Last</button>
    <button onclick="clearRejectBasket()">Clear</button>
    <button id="simpleSaveBtn" class="primaryBtn" onclick="reviewAndSaveBasket()">Review Pack</button>
    <button onclick="returnToMenu()">Back to menu</button>
  </div>

  <select id="simpleRejectQty" class="hidden"></select>
  <select id="simpleDefectType" class="hidden"></select>
</div>

    <div class="fieldBlock">
      <label>Reject quantity</label>
      <select id="simpleRejectQty"></select>
    </div>

    <div class="fieldBlock">
      <label>Reject type</label>
      <select id="simpleDefectType"></select>
    </div>

    <div class="fieldBlock">
      <label>Pack ID used</label>
      <select id="simplePackId"></select>
    </div>

    <button id="simpleSaveBtn" class="primaryBtn" onclick="saveToRejectLog()">Review & Save</button>
    <button onclick="returnToMenu()">Back to menu</button>
  </div>

  <div class="btnRow">
    <button id="nextBtn" onclick="nextStep()">Next</button>
    <button id="backBtn" onclick="prevStep()">Back</button>
    <button onclick="resetAll()">Reset</button>
    <button onclick="returnToMenu()">Back to menu</button>
  </div>

</div>

<div id="summary" style="font-size:13px;margin-top:8px;color:#333;"></div>
<div id="saveStatus"></div>
<div class="grid" id="grid"></div>

<script>
let step = 0;
let currentEntryMode = "";
let currentTeam = "";
let currentJob = null;
  let rejectBasket = {};
let rejectHistory = [];

const REJECT_LOG_WEB_APP_URL = "https://script.google.com/macros/s/AKfycbw2A9nlUMDoRk4tdpRQIm_qW86527aMnft31fTUrZqM57Nn9OQNACyqRE_fAGqOFAAU/exec";

const urlParams = new URLSearchParams(window.location.search);

let jobContext = {
  productionRow: urlParams.get("row") || "",
  jobNo: urlParams.get("jobNo") || "",
  sheetJob: urlParams.get("sheetJob") || urlParams.get("job") || "",
  packId: urlParams.get("packId") || ""
};

const ENTRY_MODES = {
  pack_visualiser: {
    label: "Pack Visualiser",
    processStage: "Pre Process",
    rejectColumn: "preProcess",
    usesVisualiser: true
  },
  moulder_rejects: {
    label: "Log Moulder Rejects",
    processStage: "Moulder",
    rejectColumn: "machine",
    usesVisualiser: false
  },
  paint_room_rejects: {
    label: "Log Paint Room Rejects",
    processStage: "Paint Room",
    rejectColumn: "machine",
    usesVisualiser: false
  }
};

const DEFECT_LISTS = {
  pack_visualiser: [
    "Forklift Damage",
    "Cracked Board",
    "Embedded Stones",
    "Shakey Board",
    "Visible Knot",
    "Resin Pockets",
    "Undersized",
    "Oversized",
    "Staples",
    "Too warped to use",
    "No Rejects"
  ],
  moulder_rejects: [
    "Incorrect Settings",
    "Top head rough",
    "2nd head rough",
    "3rd Head rough",
    "Roller marks",
    "Missing dead knots",
    "Split Knots",
    "Broken board",
    "Stuck in Moulder",
    "Chipped/breakout on profile",
    "Front Snipe",
    "End Snipe",
    "Internal shakes",
    "No Rejects",
    "End splits"
  ],
  paint_room_rejects: [
    "Snapped Board",
    "Chipped/breakout on profile",
    "Front Snipe",
    "End Snipe",
    "Internal shakes",
    "No Rejects",
    "End splits",
    "Stuck In Sander",
    "Stuck in Brusher"
  ]
};

const BOARD_LENGTHS = ["Select Board Length",2.4,2.7,3,3.3,3.6,3.7,3.9,4.2,4.5,4.8,4.9,5.1,5.4,5.7,6];

const modeSel = document.getElementById('mode');
const looseSel = document.getElementById('topLoose');
const rejectsSel = document.getElementById('rejects');
const defectTypeSel = document.getElementById('defectType');
const simpleDefectTypeSel = document.getElementById('simpleDefectType');

['Boards','Linear'].forEach(v=>{
  const o=document.createElement('option');
  o.value=v.toLowerCase();
  o.textContent=v;
  modeSel.appendChild(o);
});
modeSel.value='boards';

const bl=document.getElementById('boardLength');
BOARD_LENGTHS.forEach(v=>{
  const o=document.createElement('option');
  o.value=v==='Select Board Length'?"":v;
  o.textContent=v;
  bl.appendChild(o);
});
bl.value="";

const yieldSel=document.getElementById('yield');
for(let i=1;i<=6;i++){
  const o=document.createElement('option');
  o.value=i;
  o.textContent=i;
  yieldSel.appendChild(o);
}
yieldSel.value=1;

const perRowSel=document.getElementById('perRow');

function loadTeamQueue(team){
  currentTeam = team;
  currentJob = null;

  document.getElementById("queueStatus").innerText = "Loading Team " + team + " queue...";
  document.getElementById("jobQueue").innerHTML = "";
  document.getElementById("step0_entry").classList.add("hidden");

  const callbackName = "pwaQueueCallback_" + Date.now();

  window[callbackName] = function(data){
    delete window[callbackName];

    if(!data || !data.ok){
      document.getElementById("queueStatus").innerText = "Could not load queue.";
      return;
    }

    renderJobQueue(data.jobs || []);
  };

  const script = document.createElement("script");
  script.src =
    REJECT_LOG_WEB_APP_URL +
    "?action=getQueue&team=" +
    encodeURIComponent(team) +
    "&callback=" +
    encodeURIComponent(callbackName);

  script.onerror = function(){
    document.getElementById("queueStatus").innerText = "Queue load failed.";
    delete window[callbackName];
  };

  document.body.appendChild(script);
}

function renderJobQueue(jobs){
  const wrap = document.getElementById("jobQueue");

  if(!jobs.length){
    document.getElementById("queueStatus").innerText = "No jobs found for Team " + currentTeam + ".";
    wrap.innerHTML = "";
    return;
  }

  document.getElementById("queueStatus").innerText = "Team " + currentTeam + " jobs";

  wrap.innerHTML = "";

  jobs.forEach((job, index)=>{
    const btn = document.createElement("button");
    btn.style.textAlign = "left";
    btn.style.maxWidth = "100%";

    const packText = (job.packs || []).map(p=>p.packId).join(", ");

    btn.innerHTML =
      "<strong>" + job.sheetJob + " — " + job.client + "</strong><br>" +
      "Qty: " + job.quantity + " | " +
      job.length + "m | " +
      job.species + " | " +
      job.finishedSize + " | " +
      job.profile + "<br>" +
      "Packs: " + packText;

    btn.onclick = function(){
      selectQueueJob(job);
    };

    wrap.appendChild(btn);
  });
}

function selectQueueJob(job){
  currentJob = job;

  jobContext.productionRow = job.productionRow || "";
  jobContext.jobNo = job.jobNo || "";
  jobContext.sheetJob = job.sheetJob || "";
  jobContext.packId = job.packs && job.packs.length ? job.packs[0].packId : "";

  updateJobContextBar();
  fillPackIdFields();

  document.getElementById("teamQueueBlock").classList.add("hidden");
  document.getElementById("step0_entry").classList.remove("hidden");

  updateUI();
}

function buildPerRow(){
  perRowSel.innerHTML='';
  const ph=document.createElement('option');
  ph.value='';
  ph.textContent='How many boards per row?';
  ph.disabled=true;
  ph.selected=true;
  perRowSel.appendChild(ph);

  for(let i=1;i<=15;i++){
    const o=document.createElement('option');
    o.value=i;
    o.textContent=i;
    perRowSel.appendChild(o);
  }
}
buildPerRow();

function buildRejects(){
  rejectsSel.innerHTML = '';

  const ph = document.createElement('option');
  ph.value = '';
  ph.textContent = 'How many rejects?';
  ph.disabled = true;
  ph.selected = true;
  rejectsSel.appendChild(ph);

  for (let i = 0; i <= 30; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = i;
    rejectsSel.appendChild(o);
  }

  rejectsSel.value = '';
}
buildRejects();

  function buildSimpleRejectQty(){
  const sel = document.getElementById("simpleRejectQty");

  sel.innerHTML = "";

  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "How many rejects?";
  ph.disabled = true;
  ph.selected = true;
  sel.appendChild(ph);

  for(let i = 0; i <= 50; i++){
    const o = document.createElement("option");
    o.value = i;
    o.textContent = i;
    sel.appendChild(o);
  }

  sel.value = "";
}

buildSimpleRejectQty();

function buildDefectOptions(selectEl, entryMode){
  selectEl.innerHTML = '';

  const ph = document.createElement('option');
  ph.value = '';
  ph.textContent = 'Select reject type';
  ph.disabled = true;
  ph.selected = true;
  selectEl.appendChild(ph);

  (DEFECT_LISTS[entryMode] || []).forEach(v=>{
    const o = document.createElement('option');
    o.value = v;
    o.textContent = v;
    selectEl.appendChild(o);
  });

  selectEl.value = '';
}

function updateJobContextBar(){
  const bar = document.getElementById("jobContextBar");

  if(!jobContext.productionRow && !jobContext.jobNo && !jobContext.sheetJob && !jobContext.packId){
    bar.classList.add("hidden");
    bar.innerText = "";
    return;
  }

  const parts = [];

  if(currentTeam) parts.push("Team: " + currentTeam);
  if(jobContext.productionRow) parts.push("Production Row: " + jobContext.productionRow);
  if(jobContext.jobNo) parts.push("Job No: " + jobContext.jobNo);
  if(jobContext.sheetJob) parts.push("Sheet Job: " + jobContext.sheetJob);
  if(jobContext.packId) parts.push("Pack ID: " + jobContext.packId);

  bar.innerText = parts.join(" | ");
  bar.classList.remove("hidden");
}

function getPackOptions(){
  if(currentJob && Array.isArray(currentJob.packs) && currentJob.packs.length){
    return currentJob.packs
      .filter(p => p.packId)
      .map(p => ({
        packId: p.packId,
        label:
          "Pack " +
          p.packOrder +
          ": " +
          p.packId +
          (p.stockCheck && p.stockCheck !== "OK" ? " (" + p.stockCheck + ")" : "")
      }));
  }

  if(jobContext.packId){
    return [
      {
        packId: jobContext.packId,
        label: jobContext.packId
      }
    ];
  }

  return [];
}

function populatePackSelect(selectEl, selectedPackId){
  const packs = getPackOptions();

  selectEl.innerHTML = "";

  const ph = document.createElement("option");
  ph.value = "";
  ph.textContent = "Select Pack ID";
  ph.disabled = true;
  ph.selected = true;
  selectEl.appendChild(ph);

  packs.forEach(p => {
    const o = document.createElement("option");
    o.value = p.packId;
    o.textContent = p.label;
    selectEl.appendChild(o);
  });

  if(selectedPackId && packs.some(p => p.packId === selectedPackId)){
    selectEl.value = selectedPackId;
  } else if(packs.length === 1){
    selectEl.value = packs[0].packId;
  } else {
    selectEl.value = "";
  }
}

function fillPackIdFields(){
  populatePackSelect(document.getElementById("packId"), jobContext.packId || "");
  populatePackSelect(document.getElementById("simplePackId"), jobContext.packId || "");
}

function setEntryMode(mode){
  currentEntryMode = mode;
  document.getElementById("saveStatus").innerText = "";

  if(mode === "pack_visualiser"){
    step = 1;
    buildDefectOptions(defectTypeSel, mode);
    } else {
    step = 0;
    buildDefectOptions(simpleDefectTypeSel, mode);
    document.getElementById("simpleLoggerTitle").innerText = ENTRY_MODES[mode].label;
    clearRejectBasket();
    buildBasketRejectButtons(mode);
  }
  fillPackIdFields();
  updateUI();
  render();
}

function returnToMenu(){
  currentEntryMode = "";
  step = 0;
  clearRejectBasket();
  document.getElementById("saveStatus").innerText = "";
  clearGrid();
  document.getElementById("summary").innerText = "";
  updateUI();
}

function state(){
  return {
    mode: modeSel.value,
    boards: +document.getElementById('boards').value || 0,
    metres: +document.getElementById('metres').value || 0,
    boardLength: +document.getElementById('boardLength').value || 0,
    perRow: +perRowSel.value || 0,
    yield: +document.getElementById('yield').value || 1,
    topLoose: looseSel.value==='' ? null : parseInt(looseSel.value),
    rejects: +rejectsSel.value || 0
  };
}

function basePieces(s){
  if(s.mode==='linear'){
    if(!s.metres||!s.boardLength) return 0;
    return Math.ceil(s.metres/s.boardLength);
  }
  return s.boards;
}

function calculationResult(){
  const s = state();

  const base = basePieces(s);
  const total = base + s.rejects;
  const physicalBoards = Math.ceil(total / s.yield);
  const basePhysicalBoards = Math.ceil(base / s.yield);

  let rows = [];
  let rem = physicalBoards;

  if(s.topLoose !== null){
    const t = Math.min(s.topLoose, rem);
    rows.push(t);
    rem -= t;
  }

  while(rem > 0){
    const c = Math.min(s.perRow, rem);
    rows.push(c);
    rem -= c;
  }

  return {
    mode: s.mode,
    inputBoards: s.boards,
    inputMetres: s.metres,
    boardLength: s.boardLength,
    yield: s.yield,
    topLoose: s.topLoose,
    rows: rows.length,
    baseBoards: base,
    basePhysicalBoards: basePhysicalBoards,
    perRow: s.perRow,
    rejects: s.rejects,
    total: total,
    physicalBoards: physicalBoards
  };
}

function canProceed(){
  const s=state();

  if(currentEntryMode !== "pack_visualiser") return false;

  if(step===1){
    return s.mode==='boards'
      ? s.boards>0
      : (s.metres>0 && s.boardLength>0);
  }

  if(step===2) return s.perRow>0;
  if(step===4) return s.topLoose!==null;

  return true;
}

function updateUI(){
  const isMenu = currentEntryMode === "";
  const isVisualiser = currentEntryMode === "pack_visualiser";
  const isSimpleLogger = currentEntryMode && currentEntryMode !== "pack_visualiser";
  const inStep5 = isVisualiser && step === 5;

  document.getElementById('teamQueueBlock').classList.toggle('hidden', currentJob !== null);
  document.getElementById('step0_entry').classList.toggle('hidden', !isMenu || currentJob === null);
  document.getElementById('simpleLogger').classList.toggle('hidden', !isSimpleLogger);

  document.getElementById('modeBlock').classList.toggle('hidden', !isVisualiser || inStep5);

  document.getElementById('boardsWrap')
    .classList.toggle('hidden', modeSel.value !== 'boards');

  document.getElementById('linearWrap')
    .classList.toggle('hidden', modeSel.value !== 'linear');

  document.querySelectorAll('.step').forEach(el => el.classList.add('hidden'));

  if(isVisualiser){
    if(step === 1) document.getElementById('step1_boards').classList.remove('hidden');
    if(step === 2) document.getElementById('step2_perRow').classList.remove('hidden');
    if(step === 3) document.getElementById('step3_yield').classList.remove('hidden');
    if(step === 4) document.getElementById('step4_loose').classList.remove('hidden');
    if(step === 5) document.getElementById('step5_rejects').classList.remove('hidden');
  }

  document.getElementById('nextBtn').disabled = !canProceed();

  document.getElementById('nextBtn')
    .classList.toggle('hidden', !isVisualiser || inStep5);

  document.getElementById('backBtn')
    .classList.toggle('hidden', !isVisualiser || step <= 1);

  document.querySelector('.btnRow')
    .classList.toggle('hidden', !isVisualiser || inStep5);

  updateLooseOptions();
  syncNoRejects();
}

function nextStep(){
  if(canProceed()){
    if(step === 3){
      step = 4;
    } else {
      step++;
    }
  }

  updateUI();
  render();
}

function prevStep(){
  if(step>1) step--;
  updateUI();
  render();
}

function clearGrid(){
  document.getElementById('grid').innerHTML='';
}

function render(){
  if(currentEntryMode !== "pack_visualiser"){
    clearGrid();
    document.getElementById('summary').innerText = '';
    return;
  }

  const s = state();

  clearGrid();

  const base = basePieces(s);
  const total = base + s.rejects;
  const phys = Math.ceil(total / s.yield);
  const basePhys = Math.ceil(base / s.yield);

  if(!s.perRow){
    document.getElementById('summary').innerText = '';
    return;
  }

  let rows = [];
  let rem = phys;

  if(s.topLoose !== null){
    const t = Math.min(s.topLoose, rem);
    rows.push(t);
    rem -= t;
  }

  while(rem > 0){
    const c = Math.min(s.perRow, rem);
    rows.push(c);
    rem -= c;
  }

  let count = 1;

  rows.forEach((cap,r)=>{
    const row = document.createElement('div');
    row.className = 'row' + (r===0 ? ' loose' : '');

    let cells = [];

    for(let c = 0; c < s.perRow; c++){
      const d = document.createElement('div');

      const ok = c < cap && count <= phys;

      if(ok){
        d.className = 'cell' + (count > basePhys ? ' reject' : '');
        d.innerText = count++;
      } else {
        d.className = 'empty';
      }

      cells.push(d);
    }

    cells.reverse().forEach(x => row.appendChild(x));

    const rn = document.createElement('div');
    rn.className = 'rowNum';
    rn.innerText = r+1;
    row.appendChild(rn);

    document.getElementById('grid').appendChild(row);
  });

  document.getElementById('summary').innerText =
    `Rows: ${rows.length} | Base Boards: ${base} | Per Row: ${s.perRow} | Rejects: ${s.rejects} | Total: ${total}`;
}

function resetAll(){
  step = currentEntryMode === "pack_visualiser" ? 1 : 0;

  document.getElementById('boards').value = '';
  document.getElementById('metres').value = '';

  modeSel.value = 'boards';
  bl.value = '';
  yieldSel.value = 1;

  perRowSel.value = '';
  looseSel.value = '';
  rejectsSel.value = '';
  defectTypeSel.value = '';
  simpleDefectTypeSel.value = '';
  document.getElementById("simpleRejectQty").value = '';
clearRejectBasket();

  fillPackIdFields();

  document.getElementById("saveStatus").innerText = "";

  clearGrid();

  updateUI();
  render();
}

function updateLooseOptions(){
  const s = state();

  const sel = looseSel;
  const prev = sel.value;

  sel.innerHTML = '';

  const ph = document.createElement('option');
  ph.value = '';
  ph.textContent = 'How many loose boards on the pack?';
  ph.disabled = true;
  ph.selected = true;
  sel.appendChild(ph);

  const max = s.perRow ? Math.max(0, s.perRow - 1) : 0;

  for (let i = 0; i <= max; i++) {
    const o = document.createElement('option');
    o.value = i;
    o.textContent = i;
    sel.appendChild(o);
  }

  if (prev !== '' && Number(prev) <= max) {
    sel.value = prev;
  } else {
    sel.value = '';
  }
}

function syncNoRejects(){
  if(currentEntryMode === "pack_visualiser"){
    if(defectTypeSel.value === "No Rejects"){
      rejectsSel.value = "0";
      rejectsSel.disabled = true;
    } else {
      rejectsSel.disabled = false;
    }
  }

  if(currentEntryMode && currentEntryMode !== "pack_visualiser"){
    const simpleRejectQty = document.getElementById("simpleRejectQty");

    if(simpleDefectTypeSel.value === "No Rejects"){
      simpleRejectQty.value = "0";
      simpleRejectQty.disabled = true;
    } else {
      simpleRejectQty.disabled = false;
    }
  }
}

modeSel.addEventListener('change',()=>{ step=1; updateUI(); render(); });

document.querySelectorAll('input,select').forEach(el=>{
  el.addEventListener('input',()=>{
    syncNoRejects();
    updateUI();
    render();
  });

  el.addEventListener('change',()=>{
    syncNoRejects();
    updateUI();
    render();
  });
});

  function buildBasketRejectButtons(entryMode){
  const grid = document.getElementById("rejectButtonGrid");
  grid.innerHTML = "";

  const defects = DEFECT_LISTS[entryMode] || [];

  defects.forEach(defectType => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.textContent = defectType;

    if(defectType === "No Rejects"){
      btn.className = "primaryBtn";
    }

    btn.onclick = function(){
      addRejectToBasket(defectType);
    };

    grid.appendChild(btn);
  });

  renderRejectBasket();
}

function addRejectToBasket(defectType){
  if(defectType === "No Rejects"){
    rejectBasket = {
      "No Rejects": 0
    };

    rejectHistory = [
      {
        defectType: "No Rejects",
        qty: 0
      }
    ];

    renderRejectBasket();
    return;
  }

  if(rejectBasket["No Rejects"] !== undefined){
    rejectBasket = {};
    rejectHistory = [];
  }

  if(!rejectBasket[defectType]){
    rejectBasket[defectType] = 0;
  }

  rejectBasket[defectType] += 1;

  rejectHistory.push({
    defectType: defectType,
    qty: 1
  });

  renderRejectBasket();
}

function decrementReject(defectType){
  if(rejectBasket[defectType] === undefined) return;

  if(defectType === "No Rejects"){
    delete rejectBasket[defectType];
    rejectHistory = [];
    renderRejectBasket();
    return;
  }

  rejectBasket[defectType] -= 1;

  if(rejectBasket[defectType] <= 0){
    delete rejectBasket[defectType];
  }

  for(let i = rejectHistory.length - 1; i >= 0; i--){
    if(rejectHistory[i].defectType === defectType){
      rejectHistory.splice(i, 1);
      break;
    }
  }

  renderRejectBasket();
}

function undoLastReject(){
  if(!rejectHistory.length){
    renderRejectBasket();
    return;
  }

  const last = rejectHistory.pop();

  if(last.defectType === "No Rejects"){
    delete rejectBasket["No Rejects"];
    renderRejectBasket();
    return;
  }

  if(rejectBasket[last.defectType] !== undefined){
    rejectBasket[last.defectType] -= 1;

    if(rejectBasket[last.defectType] <= 0){
      delete rejectBasket[last.defectType];
    }
  }

  renderRejectBasket();
}

function clearRejectBasket(){
  rejectBasket = {};
  rejectHistory = [];
  renderRejectBasket();
}

function renderRejectBasket(){
  const box = document.getElementById("rejectBasketTotals");
  if(!box) return;

  const lines = getBasketRejectLines();

  if(!lines.length){
    box.innerHTML = "No rejects logged yet.";
    return;
  }

  let total = 0;
  box.innerHTML = "";

  lines.forEach(line => {
    total += Number(line.rejectQty || 0);

    const row = document.createElement("div");
    row.className = "rejectBasketLine";

    const label = document.createElement("div");
    label.textContent = line.defectType + ": " + line.rejectQty;

    const minus = document.createElement("button");
    minus.type = "button";
    minus.textContent = "-";
    minus.onclick = function(){
      decrementReject(line.defectType);
    };

    row.appendChild(label);
    row.appendChild(minus);
    box.appendChild(row);
  });

  const totalRow = document.createElement("div");
  totalRow.style.marginTop = "8px";
  totalRow.style.fontWeight = "600";
  totalRow.textContent = "Total rejects: " + total;
  box.appendChild(totalRow);
}

function getBasketRejectLines(){
  return Object.keys(rejectBasket).map(defectType => ({
    defectType: defectType,
    rejectQty: Number(rejectBasket[defectType] || 0)
  }));
}
  
function getRejectDetails(){
  if(!currentEntryMode) return null;

  const config = ENTRY_MODES[currentEntryMode];

  if(currentEntryMode === "pack_visualiser"){
    const result = calculationResult();
    const defectType = defectTypeSel.value;
    const packId = document.getElementById("packId").value.trim();
    const rejectQty = defectType === "No Rejects" ? 0 : result.rejects;

    return {
      config,
      defectType,
      packId,
      rejectQty,
      result
    };
  }

  const defectType = simpleDefectTypeSel.value;
  const packId = document.getElementById("simplePackId").value.trim();
  const rejectQty = defectType === "No Rejects"
    ? 0
    : (+document.getElementById("simpleRejectQty").value || 0);

  return {
    config,
    defectType,
    packId,
    rejectQty,
    result: {
      mode: "",
      inputBoards: "",
      inputMetres: "",
      boardLength: "",
      yield: "",
      topLoose: "",
      rows: "",
      baseBoards: "",
      basePhysicalBoards: "",
      perRow: "",
      rejects: rejectQty,
      total: "",
      physicalBoards: ""
    }
  };
}

  async function reviewAndSaveBasket(){
  const status = document.getElementById("saveStatus");
  const saveBtn = document.getElementById("simpleSaveBtn");

  if(!currentEntryMode || currentEntryMode === "pack_visualiser"){
    status.innerText = "Choose Moulder or Paint Room rejects first.";
    return;
  }

  if(!jobContext.productionRow){
    status.innerText = "No Production row found. Select a scheduled job first.";
    return;
  }

  const config = ENTRY_MODES[currentEntryMode];
  const packId = document.getElementById("simplePackId").value.trim();
  const rejectLines = getBasketRejectLines();

  if(!packId){
    status.innerText = "Select the Pack ID before reviewing.";
    return;
  }

  if(!rejectLines.length){
    status.innerText = "Tap at least one reject type, or select No Rejects.";
    return;
  }

  const totalRejects = rejectLines.reduce((sum, line) => {
    return sum + Number(line.rejectQty || 0);
  }, 0);

  const recapLines = [
    "Review pack reject log",
    "",
    "Team: " + (currentTeam || ""),
    "Job: " + (jobContext.sheetJob || ""),
    "Production Row: " + (jobContext.productionRow || "")
  ];

  if(currentJob){
    recapLines.push(
      "Client: " + (currentJob.client || ""),
      "Spec: " +
        (currentJob.quantity || "") + " | " +
        (currentJob.length || "") + "m | " +
        (currentJob.species || "") + " | " +
        (currentJob.finishedSize || "") + " | " +
        (currentJob.profile || "")
    );
  }

  recapLines.push(
    "Process: " + (config.processStage || ""),
    "Pack ID: " + packId,
    "",
    "Rejects:"
  );

  rejectLines.forEach(line => {
    recapLines.push("- " + line.defectType + ": " + line.rejectQty);
  });

  recapLines.push(
    "",
    "Total rejects: " + totalRejects,
    "Logged As: " + (config.rejectColumn === "machine" ? "Machine Defect" : "Pre Process Reject")
  );

  if(!window.confirm(recapLines.join("\n"))){
    status.innerText = "Save cancelled. Continue logging or edit the basket.";
    return;
  }

  if(!REJECT_LOG_WEB_APP_URL){
    status.innerText = "Reject Log web app URL has not been added yet.";
    return;
  }

  const payload = {
    source: "Board Calculator",
    timestamp: new Date().toISOString(),
    productionRow: jobContext.productionRow,
    jobNo: jobContext.jobNo,
    sheetJob: jobContext.sheetJob,
    packId: packId,
    entryMode: currentEntryMode,
    entryModeLabel: config.label,
    processStage: config.processStage,
    rejectColumn: config.rejectColumn,
    rejects: rejectLines
  };

  saveBtn.disabled = true;
  status.innerText = "Saving...";

  try {
    await fetch(REJECT_LOG_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    status.innerText = "Saved. Basket cleared.";
    clearRejectBasket();

  } catch(err) {
    status.innerText = "Save failed: " + err.message;
  } finally {
    saveBtn.disabled = false;
  }
}
  
async function saveToRejectLog(){
  const status = document.getElementById("saveStatus");
  const saveBtn = currentEntryMode === "pack_visualiser"
    ? document.getElementById("saveBtn")
    : document.getElementById("simpleSaveBtn");

  const details = getRejectDetails();

  if(!details){
    status.innerText = "Choose an entry type first.";
    return;
  }

  if(!jobContext.productionRow){
    status.innerText = "No Production row found. Open this app by scanning the QR code from the job sheet.";
    return;
  }

  if(!details.defectType){
    status.innerText = "Select a reject type before saving.";
    return;
  }

  if(details.defectType !== "No Rejects" && details.rejectQty <= 0){
    status.innerText = "Enter a reject quantity greater than zero, or select No Rejects.";
    return;
  }

  if(currentEntryMode === "pack_visualiser"){

    perRow: details.result.perRow,
    rejects: details.rejectQty,
    total: details.result.total,
    physicalBoards: details.result.physicalBoards
  };

  const recapLines = [
  "Confirm reject log entry",
  "",
  "Team: " + (currentTeam || ""),
  "Job: " + (jobContext.sheetJob || ""),
  "Production Row: " + (jobContext.productionRow || ""),
  "Process: " + (details.config.processStage || ""),
  "Pack ID: " + (details.packId || ""),
  "Reject Type: " + (details.defectType || ""),
  "Quantity: " + details.rejectQty,
  "Logged As: " + (details.config.rejectColumn === "machine" ? "Machine Defect" : "Pre Process Reject")
];

if(currentJob){
  recapLines.splice(
    4,
    0,
    "Client: " + (currentJob.client || ""),
    "Spec: " +
      (currentJob.quantity || "") + " | " +
      (currentJob.length || "") + "m | " +
      (currentJob.species || "") + " | " +
      (currentJob.finishedSize || "") + " | " +
      (currentJob.profile || "")
  );
}

if(!window.confirm(recapLines.join("\n"))){
  status.innerText = "Save cancelled. Edit the entry and save again.";
  return;
}
  
  saveBtn.disabled = true;
  status.innerText = "Saving...";

  try {
    await fetch(REJECT_LOG_WEB_APP_URL, {
      method: "POST",
      mode: "no-cors",
      headers: {
        "Content-Type": "text/plain;charset=utf-8"
      },
      body: JSON.stringify(payload)
    });

    status.innerText = "Saved.";
  } catch(err) {
    status.innerText = "Save failed: " + err.message;
  } finally {
    saveBtn.disabled = false;
  }
}

updateJobContextBar();
fillPackIdFields();
updateUI();
render();

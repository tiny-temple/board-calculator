<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Board Calculator</title>

  <meta name="description" content="Board Calculator PWA" />
  <meta name="theme-color" content="#111111" />

  <link rel="manifest" href="./manifest.json" />

  <link rel="icon" href="./icons/icon-192.png" type="image/png" />
  <link rel="apple-touch-icon" href="./icons/icon-192.png" />

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <main id="app">
    <h1>Board Calculator</h1>

    <section class="calculator-card">
      <label for="linearMetres">Linear metres required</label>
      <input
        id="linearMetres"
        type="number"
        inputmode="decimal"
        min="0"
        step="0.01"
        placeholder="e.g. 250"
      />

      <label for="boardLength">Board length in metres</label>
      <input
        id="boardLength"
        type="number"
        inputmode="decimal"
        min="0"
        step="0.1"
        placeholder="e.g. 4.8"
      />

      <label for="coveragePerBoard">Coverage per board in mm</label>
      <input
        id="coveragePerBoard"
        type="number"
        inputmode="decimal"
        min="0"
        step="1"
        placeholder="e.g. 92"
      />

      <label for="wastage">Wastage percentage</label>
      <input
        id="wastage"
        type="number"
        inputmode="decimal"
        min="0"
        step="1"
        value="10"
      />

      <button id="calculateButton" type="button">Calculate</button>

      <div id="result" class="result" aria-live="polite"></div>
    </section>

    <button id="installButton" type="button" hidden>
      Install app
    </button>
  </main>

  <script src="./app.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", function () {
        navigator.serviceWorker
          .register("./service-worker.js")
          .catch(function (error) {
            console.error("Service worker registration failed:", error);
          });
      });
    }

    let deferredPrompt;
    const installButton = document.getElementById("installButton");

    window.addEventListener("beforeinstallprompt", function (event) {
      event.preventDefault();
      deferredPrompt = event;
      installButton.hidden = false;
    });

    installButton.addEventListener("click", async function () {
      if (!deferredPrompt) return;

      deferredPrompt.prompt();
      await deferredPrompt.userChoice;

      deferredPrompt = null;
      installButton.hidden = true;
    });
  </script>
</body>
</html>
